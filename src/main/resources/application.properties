# ==============================
# FutureVet API - Configurações
# ==============================

spring.application.name=futurevet-api

# ==============================
# Banco de Dados H2 (desenvolvimento)
# ==============================
spring.datasource.url=jdbc:h2:mem:futurevetdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==============================
# JPA / Hibernate
# ==============================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Garante que o Hibernate cria as tabelas ANTES do data.sql rodar
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ==============================
# Swagger / OpenAPI
# ==============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tryItOutEnabled=true

# ==============================
# Cache
# ==============================
spring.cache.type=simple

# ==============================
# Serialização de datas (ISO 8601)
# ==============================
spring.jackson.serialization.write-dates-as-timestamps=false

