# ==============================
# FutureVet API - Configuracoes
# ==============================

spring.application.name=futurevet-api

# ==============================
# Banco de Dados MySQL
# ==============================
spring.datasource.url=jdbc:mysql://mysql-futurevet:3306/db-futurevet?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=user-futurevet
spring.datasource.password=senha-futurevet

# ==============================
# JPA / Hibernate
# ==============================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Desabilita execucao do data.sql (tabelas ja criadas pelo init.sql do MySQL)
spring.sql.init.mode=never

# ==============================
# Swagger / OpenAPI
# ==============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tryItOutEnabled=true

# ==============================
# Cache
# ==============================
spring.cache.type=simple

# ==============================
# Serializacao de datas (ISO 8601)
# ==============================
spring.jackson.serialization.write-dates-as-timestamps=false